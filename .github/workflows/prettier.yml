name: Prettier code formatter

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main

jobs:
  format:
    runs-on: ubuntu-latest
    # Only run on push (not PRs) to avoid permission issues with forks
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
      - name: Install Prettier 💾
        run: npm install --save-dev --save-exact prettier @shopify/prettier-plugin-liquid
      - name: Prettier Auto-fix ✨
        run: npx prettier . --write
      - name: Commit changes 💾
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format with prettier"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
